<!DOCTYPE html>

<html class="light" lang="en"><head><meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Customer Information - Richse Official</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c4a4a8",
                        "brand-beige": "#fcf9f6",
                        "background-light": "#fcf9f6",
                        "background-dark": "#1a1515",
                    },
                    fontFamily: {
                        "sans": ["Public Sans", "sans-serif"],
                        "display": ["Playfair Display", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Public Sans", sans-serif;
        }
        .brand-heading {
            font-family: "Playfair Display", serif;
        }
    </style></head>
<body class="bg-brand-beige dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-[500px] bg-white dark:bg-stone-900 rounded-xl shadow-[0_32px_64px_-15px_rgba(0,0,0,0.08)] overflow-hidden border border-stone-100/50 dark:border-stone-800">
<div class="px-8 pt-12 pb-10 flex flex-col items-center">
<div class="mb-8 text-center">
<span class="text-stone-400 tracking-[0.4em] uppercase text-[10px] font-bold block mb-3">Richse Official</span>
<h1 class="text-stone-800 dark:text-stone-100 text-3xl font-medium tracking-tight brand-heading">Customer Information</h1>
<p class="text-stone-500 dark:text-stone-400 text-sm mt-2">Please provide your details to process your request</p>
</div>
<form class="w-full space-y-6">
<div class="space-y-2">
<label class="block text-stone-500 dark:text-stone-400 text-[11px] font-bold tracking-widest uppercase">
                        Full Name (ชื่อ-นามสกุล)
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-stone-400 group-focus-within:text-primary transition-colors">person</span>
</div>
<input class="w-full pl-12 pr-4 py-4 rounded-lg bg-white dark:bg-stone-800 border-stone-200 dark:border-stone-700 text-stone-900 dark:text-white placeholder-stone-300 focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none" placeholder="Enter your full name" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-stone-500 dark:text-stone-400 text-[11px] font-bold tracking-widest uppercase">
                        Phone Number (เบอร์โทรศัพท์)
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-stone-400 group-focus-within:text-primary transition-colors">call</span>
</div>
<input class="w-full pl-12 pr-4 py-4 rounded-lg bg-white dark:bg-stone-800 border-stone-200 dark:border-stone-700 text-stone-900 dark:text-white placeholder-stone-300 focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none" placeholder="08X-XXX-XXXX" type="tel"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-stone-500 dark:text-stone-400 text-[11px] font-bold tracking-widest uppercase">
                        Order Number (เลขที่คำสั่งซื้อ)
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-stone-400 group-focus-within:text-primary transition-colors">shopping_bag</span>
</div>
<input class="w-full pl-12 pr-4 py-4 rounded-lg bg-white dark:bg-stone-800 border-stone-200 dark:border-stone-700 text-stone-900 dark:text-white placeholder-stone-300 focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none" placeholder="#12345" type="text"/>
</div>
</div>
<div class="pt-6">
<button class="w-full bg-primary hover:opacity-90 text-white font-semibold py-5 rounded-lg transition-all duration-300 transform active:scale-[0.98] shadow-md shadow-primary/10 flex items-center justify-center gap-2 group" type="submit">
<span>Submit Information</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<div class="flex items-center justify-center gap-2 mt-8 opacity-40">
<span class="h-px w-8 bg-stone-400"></span>
<span class="text-[10px] tracking-widest uppercase font-bold text-stone-900 dark:text-white">Secure Form</span>
<span class="h-px w-8 bg-stone-400"></span>
</div>
</form>
</div>
</div>
</body></html>
